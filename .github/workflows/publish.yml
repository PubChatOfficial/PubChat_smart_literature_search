name: Build & Sync to Public

on:
  push:
    branches: [main]

jobs:
  # 只有修改 celery-worker 代码，才构建镜像
  build-celery:
    runs-on: ubuntu-latest
    if: contains(join(github.event.head_commit.modified), 'backend/celery-worker/')
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/celery-worker
          file: ./backend/celery-worker/Dockerfile.prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: wuyuxuan1037/pubchat-celery-worker:latest

  # 同步代码到公开仓库
  sync-to-public:
    runs-on: ubuntu-latest
    needs: build-celery
    if: always() 
    steps:
      - uses: actions/checkout@v4
        with:
          depth: 0

      - name: Clean backend/celery-worker
        run: |
          cd backend/celery_worker
          shopt -s extglob
          rm -rf !(.env.shared)
      - name: Remove dev files
        run: |
          rm -f docker-compose.override.yml
          rm -rf .github/workflows/
      - name: Remove frontend files
        run: |
          cd frontend
          shopt -s extglob
          rm -rf !(dist)
      - name: Push to public repo
        uses: ad-m/github-push-action@master
        with:
          repository: PubChatOfficial/PubChat_smart_literature_search
          branch: main
          github_token: ${{ secrets.SYNC_PAT_TOKEN }}
          force: true