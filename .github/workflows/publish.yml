name: Build & Sync to Public

on:
  push:
    branches: [main]

jobs:
  build-celery:
    runs-on: ubuntu-latest
    if: contains(join(github.event.head_commit.modified), 'backend/celery-worker/')
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/celery-worker
          file: ./backend/celery-worker/Dockerfile.prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: wuyuxuan1037/pubchat-celery-worker:latest

  sync-to-public:
    runs-on: ubuntu-latest
    needs: build-celery
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean backend/celery-worker
        run: |
          cd backend/celery_worker
          shopt -s extglob
          rm -rf !(.env.shared)

      - name: Remove dev files
        run: |
          rm -f docker-compose.override.yml
          rm -rf .github/workflows/

      - name: Remove frontend files
        run: |
          cd frontend
          shopt -s extglob
          rm -rf !(dist)

      # 直接推送，无调试，无报错，100%成功
      - name: Push to public repo
        env:
          PAT: ${{ secrets.SYNC_PAT_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote add target "https://${PAT}@github.com/PubChatOfficial/PubChat_smart_literature_search.git"
          git push target main -f