sync-to-public:
    runs-on: ubuntu-latest
    needs: build-celery
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT_TOKEN }}

      - name: Clean backend/celery-worker
        run: |
          cd backend/celery_worker
          shopt -s extglob
          rm -rf !(.env.shared)

      - name: Remove dev files
        run: |
          rm -f docker-compose.override.yml
          rm -rf .github/workflows/

      - name: Remove frontend files
        run: |
          cd frontend
          shopt -s extglob
          rm -rf !(dist)

      - name: Commit and Push to public repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 提交更改 (记录删除的那些文件)
          git add -A
          git diff-index --quiet HEAD || git commit -m "chore: remove private files and config"
          
          # 推送修改后的代码
          git push https://github.com/PubChatOfficial/PubChat_smart_literature_search.git HEAD:main -f